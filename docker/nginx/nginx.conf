# 本番用設定（HTTPS）。Let's Encrypt証明書取得後にnginx-bootstrap.confから切り替える。
# 切り替え手順はdocs/DEPLOY.md参照。

server {
    listen 80;
    server_name novelshelf.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name novelshelf.jp;

    ssl_certificate /etc/letsencrypt/live/novelshelf.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novelshelf.jp/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # 全話一括取得は話数が多いと数分かかるため、他のAPIより長いタイムアウトを設定する
    # (docs/KNOWN_ISSUES.md参照)。
    location ~ ^/api/v1/novels/[^/]+/download$ {
        proxy_pass http://backend:8080;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://backend:8080/api/v1/;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
