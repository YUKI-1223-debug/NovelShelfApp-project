name: E2E & なろう疎通確認 (手動/定期実行)

# なろうの実サイトへアクセスするテストを含むため、通常のpush/PRトリガーには含めない。
# 手動実行、または週1回の定期実行のみとし、なろうサーバーへの不要な負荷を避ける。
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 18 * * 1" # 毎週月曜 03:00 JST

jobs:
  narou-live-check:
    name: なろうAPIとページ構造の疎通確認
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: ./gradlew externalTest

  e2e:
    name: Playwright E2E (Docker Compose full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose --env-file .env -f docker/docker-compose.yml up --build -d

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker compose --env-file .env -f docker/docker-compose.yml ps --format json | jq -s 'map(.Health == "healthy") | all')
            if [ "$status" = "true" ]; then echo "healthy"; exit 0; fi
            sleep 5
          done
          docker compose --env-file .env -f docker/docker-compose.yml logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npx playwright install --with-deps chromium

      - working-directory: frontend
        run: npm run test:e2e

      - name: Show logs on failure
        if: failure()
        run: docker compose --env-file .env -f docker/docker-compose.yml logs

      - if: always()
        run: docker compose --env-file .env -f docker/docker-compose.yml down
