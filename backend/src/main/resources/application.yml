spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/novelshelf}
    username: ${SPRING_DATASOURCE_USERNAME:novelshelf}
    password: ${SPRING_DATASOURCE_PASSWORD:novelshelf}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    # 未設定(空文字)でも起動はできる。送信時に失敗するだけで、呼び出し元には伝播しない
    # （PasswordResetService参照）。プロバイダ(Gmail SMTP/SendGrid/ConoHaメール等)を問わず
    # SMTP接続情報を環境変数で渡すだけで動く設計（docs/DECISIONS.md参照）。
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

novelshelf:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-please-32bytes-min}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  narou:
    api-base-url: ${NAROU_API_BASE_URL:https://api.syosetu.com/novelapi/api/}
    site-base-url: ${NAROU_SITE_BASE_URL:https://ncode.syosetu.com}
    request-interval-ms: ${NAROU_REQUEST_INTERVAL_MS:1000}
    # ノクターン/ムーンライト/ミッドナイトノベルズ(R18)向け。参照: docs/DECISIONS.md
    r18-api-base-url: ${NAROU_R18_API_BASE_URL:https://api.syosetu.com/novel18api/api/}
    r18-site-base-url: ${NAROU_R18_SITE_BASE_URL:https://novel18.syosetu.com}
  kakuyomu:
    site-base-url: ${KAKUYOMU_SITE_BASE_URL:https://kakuyomu.jp}
    request-interval-ms: ${KAKUYOMU_REQUEST_INTERVAL_MS:1000}
  hameln:
    site-base-url: ${HAMELN_SITE_BASE_URL:https://syosetu.org}
    request-interval-ms: ${HAMELN_REQUEST_INTERVAL_MS:1000}
  cors:
    # 本番はCORS_ALLOWED_ORIGINSにカンマ区切りで実際のオリジン(例: https://novelshelf.jp)を指定する
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  mail:
    from: ${MAIL_FROM:no-reply@novelshelf.jp}
    reset-token-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:30}
    # パスワード再設定メールに載せるリンクの基点。本番はFRONTEND_BASE_URL=https://novelshelf.jpを設定する
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3002}
